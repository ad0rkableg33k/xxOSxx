<body>

<section class="hero">
  <h1 class="glow-title">Volunteer Your Soul</h1>
  <p class="subtitle">Help us build the chaos behind the scenes.</p>
</section>

<section class="section">
  <form class="form-wrap purple" action="https://formspree.io/f/xnjenwdj" method="POST">
    <input type="hidden" name="_subject" value="New Volunteer Signup — xXOnlineStatusXx Podcast">

    <div class="field">
      <label for="v-name">Name</label>
      <input type="text" id="v-name" name="name" placeholder="What do we call you?" required>
    </div>

    <div class="field">
      <label for="v-discord">Discord Handle</label>
      <input type="text" id="v-discord" name="discord" placeholder="e.g. shadowbat#1234" required>
    </div>

    <div class="field">
      <label for="v-role">Desired Role</label>
      <select id="v-role" name="role" required>
        <option value="" disabled selected>Select a role…</option>
        <option value="Editing">Editing</option>
        <option value="Moderation">Moderation</option>
        <option value="Graphic Design">Graphic Design</option>
        <option value="Social Media">Social Media</option>
        <option value="Research">Research</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <div class="field">
      <label for="v-skills">Skills &amp; Experience</label>
      <textarea id="v-skills" name="skills" rows="4" placeholder="What can you do? Be honest." required></textarea>
    </div>

    <div class="field">
      <label for="v-availability">Availability</label>
      <input type="text" id="v-availability" name="availability" placeholder="Hours per week, timezones, etc." required>
    </div>

    <button type="submit" class="submit-btn">Submit 🩸</button>
  </form>
  <p class="form-note">Submissions go straight to the hosts' inbox via Formspree.</p>
</section>

<footer>
  <div class="copyright"><span class="x">xX</span><span class="mid">OnlineStatus</span><span class="x">Xx</span> Podcast © 2026</div>
  <div class="emoji-row">🦇 💀 ✨</div>
</footer>

</body>
</html>
